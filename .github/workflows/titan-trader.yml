- name: Write API credentials
       #!/usr/bin/env node
const fs=require("fs"),path=require("path"),https=require("https"),crypto=require("crypto");
const CFG={KEY_FILE:path.join(__dirname,"cdp_api_key.json"),PAIR:"DOGE-USD",BASE_TRADE_USD:1.00,MAX_TRADE_USD:10.00,MIN_TRADE_USD:1.00,TICK_MS:4000,RSI_PERIOD:14,RSI_BUY:35,RSI_SELL:65,MOM_BUY:0.0010,MOM_SELL:-0.0008,STOP_LOSS_PCT:0.025,TAKE_PROFIT_PCT:0.035,MAX_DRAWDOWN:0.20,SCALE_UP_AFTER:3,SCALE_DOWN_AFTER:2,SCALE_FACTOR:1.5,LOG_FILE:path.join(__dirname,"trades.log"),PERF_FILE:path.join(__dirname,"performance.json")};
const Logger={_write(l,m,d=null){const t=new Date().toISOString(),line=`[${t}] [${l}] ${m}${d?" "+JSON.stringify(d):""}`;console.log(line);fs.appendFileSync(CFG.LOG_FILE,line+"\n")},info:(m,d)=>Logger._write("INFO ",m,d),trade:(m,d)=>Logger._write("TRADE",m,d),warn:(m,d)=>Logger._write("WARN ",m,d),error:(m,d)=>Logger._write("ERROR",m,d),perf:(m,d)=>Logger._write("PERF ",m,d)};
const Perf={data:{startBalance:0,currentBalance:0,peakBalance:0,totalTrades:0,wins:0,losses:0,totalPnl:0,consecutiveWins:0,consecutiveLosses:0,currentTradeSize:CFG.BASE_TRADE_USD,trades:[],startedAt:new Date().toISOString()},load(){try{if(fs.existsSync(CFG.PERF_FILE)){this.data=JSON.parse(fs.readFileSync(CFG.PERF_FILE));Logger.info("Loaded perf history",{trades:this.data.totalTrades,pnl:this.data.totalPnl})}}catch{Logger.warn("Starting fresh")}},save(){fs.writeFileSync(CFG.PERF_FILE,JSON.stringify(this.data,null,2))},recordTrade(side,pnl,price,qty){this.data.totalTrades++;this.data.totalPnl+=pnl;if(pnl>0){this.data.wins++;this.data.consecutiveWins++;this.data.consecutiveLosses=0}else{this.data.losses++;this.data.consecutiveLosses++;this.data.consecutiveWins=0}this.data.trades.push({ts:new Date().toISOString(),side,pnl,price,qty});if(this.data.trades.length>500)this.data.trades=this.data.trades.slice(-500);this.save()},winRate(){return this.data.totalTrades>0?(this.data.wins/this.data.totalTrades)*100:0}};
const ScalingEngine={adjust(){const p=Perf.data;let size=p.currentTradeSize;if(p.consecutiveWins>=CFG.SCALE_UP_AFTER){size=Math.min(size*CFG.SCALE_FACTOR,CFG.MAX_TRADE_USD);if(size!==p.currentTradeSize){Logger.perf(`SCALE UP → $${size.toFixed(2)}`,{wins:p.consecutiveWins});p.currentTradeSize=size;Perf.save()}}if(p.consecutiveLosses>=CFG.SCALE_DOWN_AFTER){size=Math.max(size/CFG.SCALE_FACTOR,CFG.MIN_TRADE_USD);if(size!==p.currentTradeSize){Logger.perf(`SCALE DOWN → $${size.toFixed(2)}`,{losses:p.consecutiveLosses});p.currentTradeSize=size;Perf.save()}}const bg=p.currentBalance/p.startBalance;if(bg>1.5&&p.currentTradeSize<CFG.MAX_TRADE_USD){const gs=Math.min(CFG.BASE_TRADE_USD*bg,CFG.MAX_TRADE_USD);if(gs>p.currentTradeSize){p.currentTradeSize=gs;Logger.perf(`SCALE WITH BALANCE → $${gs.toFixed(2)}`);Perf.save()}}return p.currentTradeSize}};
const RiskGuard={tripped:false,check(bal){if(this.tripped)return false;const dd=(Perf.data.peakBalance-bal)/Perf.data.peakBalance;if(dd>=CFG.MAX_DRAWDOWN){Logger.warn(`KILL SWITCH: drawdown ${(dd*100).toFixed(1)}%`);this.tripped=true;return false}if(bal>Perf.data.peakBalance){Perf.data.peakBalance=bal;Perf.save()}return true}};
const Brain={prices:[],feed(p){this.prices.push(p);if(this.prices.length>120)this.prices=this.prices.slice(-120)},rsi(period=CFG.RSI_PERIOD){if(this.prices.length<period+1)return null;const sl=this.prices.slice(-period-1);let g=0,l=0;for(let i=1;i<sl.length;i++){const d=sl[i]-sl[i-1];d>0?(g+=d):(l+=Math.abs(d))}const ag=g/period,al=l/period;if(al===0)return 100;return 100-100/(1+ag/al)},momentum(lb=5){if(this.prices.length<lb+1)return 0;const r=this.prices[this.prices.length-1],p=this.prices[this.prices.length-1-lb];return(r-p)/p},volatility(lb=20){if(this.prices.length<lb)return 0;const sl=this.prices.slice(-lb),mean=sl.reduce((a,b)=>a+b,0)/sl.length,variance=sl.reduce((a,b)=>a+Math.pow(b-mean,2),0)/sl.length;return Math.sqrt(variance)/mean},signal(){const rsi=this.rsi(),mom=this.momentum(),vol=this.volatility();if(rsi===null)return{action:"WAIT",rsi,mom,vol};const buf=vol>0.01?3:0;if(rsi<(CFG.RSI_BUY-buf)&&mom>CFG.MOM_BUY)return{action:"BUY",rsi,mom,vol};if(rsi>(CFG.RSI_SELL+buf)||mom<CFG.MOM_SELL)return{action:"SELL",rsi,mom,vol};return{action:"HOLD",rsi,mom,vol}}};
function loadCredentials(){const raw=JSON.parse(fs.readFileSync(CFG.KEY_FILE));return{keyName:raw.name,privateKey:raw.privateKey}}
function makeJWT(keyName,secret){const now=Math.floor(Date.now()/1000),header=Buffer.from(JSON.stringify({alg:"HS256",kid:keyName,typ:"JWT"})).toString("base64url"),payload=Buffer.from(JSON.stringify({iss:"cdp",nbf:now,exp:now+120,sub:keyName})).toString("base64url"),msg=`${header}.${payload}`,sig=crypto.createHmac("sha256",Buffer.from(secret,"base64")).update(msg).digest("base64url");return`${msg}.${sig}`}
function apiRequest(keyName,secret,method,p,body=null){return new Promise((resolve,reject)=>{const jwt=makeJWT(keyName,secret),payload=body?JSON.stringify(body):null,opts={hostname:"api.coinbase.com",path:p,method,headers:{"Authorization":`Bearer ${jwt}`,"Content-Type":"application/json",...(payload?{"Content-Length":Buffer.byteLength(payload)}:{})}};const req=https.request(opts,res=>{let data="";res.on("data",c=>data+=c);res.on("end",()=>{try{const parsed=JSON.parse(data);if(res.statusCode>=400)reject(new Error(parsed.error||parsed.message||data));else resolve(parsed)}catch{reject(new Error("Parse error: "+data))}})});req.on("error",reject);if(payload)req.write(payload);req.end()})}
async function getPrice(c){const data=await apiRequest(c.keyName,c.privateKey,"GET","/api/v3/brokerage/best_bid_ask?product_ids=DOGE-USD");const book=data.pricebooks?.[0];if(!book)throw new Error("No price data");return(parseFloat(book.bids[0].price)+parseFloat(book.asks[0].price))/2}
async function getBalances(c){const data=await apiRequest(c.keyName,c.privateKey,"GET","/api/v3/brokerage/accounts");const accts=data.accounts||[],usd=accts.find(a=>a.currency==="USD"),doge=accts.find(a=>a.currency==="DOGE");return{usd:parseFloat(usd?.available_balance?.value||0),doge:parseFloat(doge?.available_balance?.value||0)}}
function uid(){return crypto.randomBytes(8).toString("hex")}
async function placeBuy(c,usd){return apiRequest(c.keyName,c.privateKey,"POST","/api/v3/brokerage/orders",{client_order_id:uid(),product_id:CFG.PAIR,side:"BUY",order_configuration:{market_market_ioc:{quote_size:usd.toFixed(2)}}})}
async function placeSell(c,qty){return apiRequest(c.keyName,c.privateKey,"POST","/api/v3/brokerage/orders",{client_order_id:uid(),product_id:CFG.PAIR,side:"SELL",order_configuration:{market_market_ioc:{base_size:qty.toFixed(2)}}})}
const Position={inPosition:false,entryPrice:null,entryQty:null,open(p,q,u){this.inPosition=true;this.entryPrice=p;this.entryQty=q},close(){this.inPosition=false;this.entryPrice=null;this.entryQty=null},pnlPct(p){return this.entryPrice?(p-this.entryPrice)/this.entryPrice:0},shouldStopLoss(p){return this.pnlPct(p)<=-CFG.STOP_LOSS_PCT},shouldTakeProfit(p){return this.pnlPct(p)>=CFG.TAKE_PROFIT_PCT}};
async function main(){Logger.info("TITAN TRADER v2.0 — STARTING");let creds;try{creds=loadCredentials();Logger.info("Credentials loaded")}catch(e){Logger.error("Cannot load cdp_api_key.json: "+e.message);process.exit(1)}let balances;try{balances=await getBalances(creds);Logger.info("Account connected",balances)}catch(e){Logger.error("Auth failed: "+e.message);process.exit(1)}Perf.load();if(Perf.data.startBalance===0){Perf.data.startBalance=balances.usd;Perf.data.currentBalance=balances.usd;Perf.data.peakBalance=balances.usd;Perf.save()}Logger.info("Bot running",{pair:CFG.PAIR,size:`$${Perf.data.currentTradeSize.toFixed(2)}`,balance:`$${balances.usd.toFixed(4)}`});let tickCount=0;async function tick(){tickCount++;try{const price=await getPrice(creds);Brain.feed(price);if(tickCount%10===0){balances=await getBalances(creds);Perf.data.currentBalance=balances.usd+(balances.doge*price);Perf.save()}if(!RiskGuard.check(Perf.data.currentBalance)){Logger.warn("KILL SWITCH — halted");clearInterval(loop);return}const sig=Brain.signal();if(!Position.inPosition){if(sig.action==="BUY"){const ts=ScalingEngine.adjust();if(balances.usd<ts){Logger.warn(`Low balance $${balances.usd.toFixed(4)}`);return}Logger.trade("BUY →",{rsi:sig.rsi?.toFixed(1),mom:(sig.mom*100).toFixed(3)+"%",size:ts,price});const res=await placeBuy(creds,ts);if(res.success){const qty=parseFloat(res.order?.filled_size||(ts/price).toFixed(4));Position.open(price,qty,ts);balances=await getBalances(creds);Logger.trade("BUY FILLED",{qty,price,orderId:res.order?.order_id})}else{Logger.error("BUY rejected",res.error_response)}}}else{const stopHit=Position.shouldStopLoss(price),tpHit=Position.shouldTakeProfit(price),sigSell=sig.action==="SELL",pnlPct=Position.pnlPct(price);if(stopHit||tpHit||sigSell){const reason=stopHit?"STOP LOSS":tpHit?"TAKE PROFIT":"SIGNAL";Logger.trade(`SELL → ${reason}`,{pnlPct:(pnlPct*100).toFixed(3)+"%",price});const res=await placeSell(creds,Position.entryQty);if(res.success){const pnl=(price-Position.entryPrice)*Position.entryQty;Perf.recordTrade("SELL",pnl,price,Position.entryQty);Logger.trade("SELL FILLED",{pnl:`$${pnl.toFixed(6)}`,totalPnl:`$${Perf.data.totalPnl.toFixed(6)}`,winRate:Perf.winRate().toFixed(1)+"%"});Position.close();balances=await getBalances(creds);ScalingEngine.adjust()}else{Logger.error("SELL rejected",res.error_response)}}else if(tickCount%5===0){Logger.info("HOLDING",{price,pnlPct:(pnlPct*100).toFixed(3)+"%",rsi:sig.rsi?.toFixed(1)})}}if(tickCount%30===0){Logger.perf("STATUS",{balance:`$${(balances.usd+balances.doge*price).toFixed(4)}`,size:`$${Perf.data.currentTradeSize.toFixed(2)}`,pnl:`$${Perf.data.totalPnl.toFixed(6)}`,winRate:Perf.winRate().toFixed(1)+"%"})}}catch(e){Logger.error("Tick: "+e.message)}}const loop=setInterval(tick,CFG.TICK_MS);tick();process.on("SIGINT",()=>{clearInterval(loop);process.exit(0)});process.on("SIGTERM",()=>{clearInterval(loop);process.exit(0)})}
main().catch(e=>{Logger.error("Fatal: "+e.message);process.exit(1)}); env:
          TITAN: ${{ secrets.TITAN }}
        run: |
          mkdir -p titan-bot
          printf '%s' "$TITAN" > titan-bot/cdp_api_key.json
          echo "File written, size: $(wc -c < titan-bot/cdp_api_key.json) bytes"      - name: Upload trade logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trade-logs-${{ github.run_number }}
          path: |
            titan-bot/trades.log
            titan-bot/performance.json
          retention-days: 30
